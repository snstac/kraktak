# KrakTAK Docker example config.
#
# Mount at /etc/kraktak/kraktak.conf and run:
#   docker run --rm --network host -v $PWD/kraktak.conf:/etc/kraktak/kraktak.conf \
#       kraktak:local -c /etc/kraktak/kraktak.conf

[kraktak]
COT_URL = udp://239.2.3.1:6969
FEED_URL = http://192.168.50.5:8081/DOA_value.html
POLL_INTERVAL = 3
COT_TYPES = bearing_line,lob,sensor
LOB_LENGTH_M = 10000
COT_STALE = 120
ENABLE_CONTROL = false
CONTROL_BACKEND = auto
