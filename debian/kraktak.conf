# KrakTAK environment file -> /etc/default/kraktak
#
# systemd reads this as KEY=VALUE pairs; kraktak picks them up as env vars.
# Uncomment and edit. See kraktak-example.conf for the full list.

# TAK destination (udp multicast, or tcp://host:8087 / tls://host:8089).
COT_URL=udp://239.2.3.1:6969

# KrakenSDR DOA feed.
FEED_URL=http://192.168.50.5:8081/DOA_value.html
POLL_INTERVAL=3

# CoT rendering: sensor, bearing_line, range_bearing, lob, cep
COT_TYPES=bearing_line,lob,sensor
LOB_LENGTH_M=10000
COT_STALE=120

# Control plane (TAK -> KrakenSDR). Needs a bidirectional COT_URL.
ENABLE_CONTROL=false
CONTROL_BACKEND=auto
# KRAKEN_HOST=192.168.50.5

# Debug logging: set to any value to enable.
# DEBUG=1
