# KrakTAK example configuration.
#
# Copy to /etc/default/kraktak (Debian) or pass with: kraktak -c kraktak.conf
#
# All values may also be supplied as environment variables of the same name.

[kraktak]

# --- TAK destination -------------------------------------------------------
# Where to send CoT. Examples:
#   tcp://takserver.example.com:8087
#   tls://takserver.example.com:8089   (see PYTAK_TLS_* options below)
#   udp://239.2.3.1:6969               (ATAK multicast mesh)
COT_URL = udp://239.2.3.1:6969

# To receive control commands from TAK, point at a server that streams CoT back
# (TCP/TLS to a TAK Server). Multicast (udp) is transmit-only.

# --- KrakenSDR DOA feed ----------------------------------------------------
# The "Kraken App" CSV export. Replace host with your KrakenSDR.
FEED_URL = http://192.168.50.5:8081/DOA_value.html
POLL_INTERVAL = 3

# --- CoT rendering ---------------------------------------------------------
# Comma list of: sensor, bearing_line, range_bearing, lob, cep
COT_TYPES = bearing_line,lob,sensor
# Rendered line-of-bearing length (meters). LOB_LENGTH_KM also accepted.
LOB_LENGTH_M = 10000
COT_STALE = 120

# --- Filters (optional) ----------------------------------------------------
# MIN_CONFIDENCE = 10
# MIN_RSSI = -40
# Exclusion wedge: drop bearings inside [start, end] degrees (compass).
# DOA_IGNORE_START = 170
# DOA_IGNORE_END = 190
# Randomize LOB UID so each bearing leaves a trail instead of overwriting.
# PERSIST_LOB = false

# --- CEP error ellipse (when COT_TYPES includes cep) -----------------------
# CEP_MIN_RADIUS_M = 100
# CEP_MAX_RADIUS_M = 2000

# --- Control plane: TAK -> KrakenSDR ---------------------------------------
# Enable inbound control (retune/gain/coordinates) from TAK GeoChat or a
# <__krakencmd> detail. Requires a bidirectional COT_URL (TCP/TLS).
ENABLE_CONTROL = false
# auto | settings_json | api_agent | middleware
CONTROL_BACKEND = auto
# Defaults to the FEED_URL host if unset.
# KRAKEN_HOST = 192.168.50.5
# API_AGENT_PORT = 8181
# MIDDLEWARE_PORT = 8042
# DSP_PORT = 8081

# --- Optional status dashboard ---------------------------------------------
# ENABLE_DASHBOARD = false
# DASHBOARD_HOST = 0.0.0.0
# DASHBOARD_PORT = 8000
