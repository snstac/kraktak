site_name: KrakTAK - KrakenSDR to TAK
site_url: https://kraktak.rtfd.io/
repo_url: https://github.com/snstac/kraktak/
site_description: Bridge a KrakenSDR direction-finding receiver to the Team Awareness Kit (TAK) ecosystem, with TAK-side radio control.
site_author: Sensors & Signals LLC <oss@undef.net>
copyright: Copyright Sensors & Signals LLC https://www.snstac.com

theme:
  name: material
  highlightjs: true
  features:
    - content.code.copy
    - content.code.select
    - content.code.annotate 
    
plugins:
  - include-markdown:
      opening_tag: "{!"
      closing_tag: "!}"
  - search
  - mkdocstrings:
      handlers:
        # See: https://mkdocstrings.github.io/python/usage/
        python:
          options:
            docstring_style: sphinx

markdown_extensions:
  - markdown_include.include:
      base_path: .
  - admonition
  - toc:
      permalink: True
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences